# Virtual workspace. Two transports over a shared core; the only difference between
# the p2 and p3 builds is the socket I/O substrate.
[workspace]
resolver = "2"
members = ["crates/netperf-core", "crates/netperf-p2"]

# Built per-target rather than as default workspace members:
#   crates/netperf-p3       — wasm-only component (cargo build --target wasm32-wasip2)
#   crates/netperf-p3-host  — native wasmtime host that runs it (cargo build)
exclude = ["crates/netperf-p3", "crates/netperf-p3-host"]
